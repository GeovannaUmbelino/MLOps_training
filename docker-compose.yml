version: "3.9"

services:
  # ── Training + MLflow tracking ─────────────────────────────────────────────
  train:
    build: .
    command: python main.py
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    profiles: ["train"]

  # ── MLflow UI ─────────────────────────────────────────────────────────────
  mlflow:
    build: .
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlruns
      --allowed-hosts "*"
    ports:
      - "5000:5000"
    volumes:
      - .:/app

  # ── FastAPI inference API ──────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mlflow

  # ── Streamlit frontend ────────────────────────────────────────────────────
  streamlit:
    build: .
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api